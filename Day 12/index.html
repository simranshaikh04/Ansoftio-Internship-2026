<!DOCTYPE html> 
<html> 

<head> 
<title>Cartoon Cards</title> 

<style> 

.container{     
    display: flex;     
    gap: 20px; 
} 

.card{     
    width: 30%;     
    background-color: #f0f0f0;     
    padding: 15px; 
    text-align: center;
    border-radius: 10px;
    border: 2px solid gray;
} 

.card img{
    width: 80%;
    height: fit-content;
    object-fit: cover;
    border-radius: 10px;
}

/* Responsive for mobile */ 
@media (max-width: 768px){ 
    .container{         
        flex-direction: column; 
    } 

    .card{ 
        width: 100%; 
    } 
} 

</style> 

</head> 

<body> 

<h1 style="text-align:center;">Cartoon Cards</h1> 

<div class="container"> 

<div class="card">
<img src="https://tse2.mm.bing.net/th/id/OIP.iipKrwMycaF0xbbS_ZkqcgHaEK?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Doraemon">
<h3>Doremon</h3>
<p>A robotic cat from the future who helps Nobita.</p>
</div> 

<div class="card">
<img src="https://tse2.mm.bing.net/th/id/OIP.Zpgw4-eYEbGlkGnHZfcN4gHaEJ?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Nobita">
<h3>Nobita</h3>
<p>A kind but lazy boy who always needs Doraemon’s help.</p>
</div> 

<div class="card">
<img src="https://tse2.mm.bing.net/th/id/OIP.b6szdTSkwgR72n4NtS0vzAHaEK?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Shizuka">
<h3>Shizuka</h3>
<p>A smart and kind girl, Nobita’s best friend.</p>
</div> 

</div> 

</body> 

</html>
