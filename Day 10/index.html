<!DOCTYPE html>
<html>
<head>
<title>Card Design</title>
<style>
body{
    font-family: Arial;
    background-color: #eef2ff;
}

.card{
    width: 260px;
    border-radius: 12px;
    padding: 15px;
    margin: 40px auto;
    text-align: center;
    background-color: #ffffff;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card img{
    width: 100%;
    border-radius: 10px;
}

.card h3{
    margin: 10px 0;
}

.card p{
    color: #555;
}

button{
    background-color: #2563EB;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover{
    background-color: #1e40af;
}
</style>
</head>
<body>

<div class="card">
<img src="https://via.placeholder.com/250">
<h3>Modern Card</h3>
<p>This is an improved card design using CSS with better styling.</p>
<button>Read More</button>
</div>

</body>
</html>
