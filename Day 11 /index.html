<!DOCTYPE html>
<html>

<head>
    <title>Festival Cards</title>

    <style>
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            width: 220px;
            padding: 15px;
            background-color: #f0f0f0;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 8px;
        }

        button {
            background-color: #2563EB;
            color: white;
            border: none;
            padding: 8px;
            cursor: pointer;
            border-radius: 5px;
        }

    </style>

</head>

<body>

    <h1 style="text-align:center;">Festival Cards</h1>

    <div class="container">

        <div class="card">
            <img src="https://images.herzindagi.info/her-zindagi-english/images/2025/10/15/article/image/Diwali-2025-Date-1760523955443.webp" alt="Diwali">
            <h3>Diwali</h3>
            <p>Festival of lights celebrated with diyas, sweets, and fireworks.</p>
            <button>Explore</button>
        </div>

        <div class="card">
            <img src="https://as2.ftcdn.net/v2/jpg/05/60/58/67/1000_F_560586710_VmIHNuH6TcdLHIn3cEuIDDAcCYBhkIL0.jpg" alt="Holi">
            <h3>Holi</h3>
            <p>Festival of colors symbolizing joy and love.</p>
            <button>Explore</button>
        </div>

     

        <div class="card">
            <img src="https://img.freepik.com/premium-vector/girl-playing-garba-navratri-vector_1396-716.jpg?w=2000" alt="Navratri">
            <h3>Navratri</h3>
            <p>Nine nights of dance and devotion.</p>
            <button>Explore</button>
        </div>


    </div>

</body>

</html>
